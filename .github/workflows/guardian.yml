# ⚠️ DEPRECATED: This workflow is superseded by ci.yml
# Kept for backward compatibility. Use .github/workflows/ci.yml instead.
# This workflow will be removed in a future release.
name: ShipGuard Security Scan (Deprecated)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  RISK_THRESHOLD: 80

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run security scan
        run: npm start -- scan --threshold ${{ env.RISK_THRESHOLD }}

      - name: Upload scan results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            *.log
            scan-output.txt
        continue-on-error: true
